{{define "content"}}
<h1>Catálogo</h1>
<p class="field">
  <label for="filtro">Filtrar</label>
  <input id="filtro" type="search" placeholder="Escribe para filtrar…" autocomplete="off" data-ref="filtro">
</p>

<!-- Datos para lumen: el MISMO modelo del servidor, como JSON (una sola fuente). -->
<script type="application/json" data-ref="datos">{{ .Items | tojson }}</script>

<!-- Lista del servidor: SEO y funciona sin JS. lumen la reemplaza al cargar. -->
<ul class="cards" data-ref="lista">
{{range .Items}}
  <li class="card"><h2><a href="/productos/{{.Slug}}">{{.Titulo}}</a></h2><p><strong>${{.Precio}} MXN</strong></p></li>
{{else}}
  <li>No hay productos todavía.</li>
{{end}}
</ul>
<p data-ref="vacio" hidden>Ningún producto coincide.</p>

<!-- Plantillas que clona lumen (no se renderizan solas). -->
<template id="catalogo-tpl"><ul class="cards" data-ref="items"></ul></template>
<template id="producto-tpl">
  <li class="card"><h2><a data-ref="enlace"></a></h2><p><strong data-ref="precio"></strong></p></li>
</template>
{{end}}
{{define "scripts"}}<script type="module" src="/static/js/catalogo.js"></script>{{end}}
