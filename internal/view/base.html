{{define "base"}}<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/static/scc/scc.css">
<link rel="stylesheet" href="/static/style.css">
<title>{{.Meta.Title}}</title>
<meta name="description" content="{{.Meta.Description}}">
<link rel="canonical" href="{{.Meta.Canonical}}">
<meta property="og:type" content="{{.Meta.OGType}}">
<meta property="og:title" content="{{.Meta.Title}}">
<meta property="og:description" content="{{.Meta.Description}}">
{{with .Meta.JSONLD}}<script type="application/ld+json">{{.}}</script>{{end}}
</head>
<body>
<header class="navbar">
  <a href="/" data-brand>Agogo</a>
  <a href="/blog">Blog</a>
  <a href="/quienes-somos">Quiénes somos</a>
  <a href="/contacto">Contacto</a>
  <span data-nav-end><a href="/cuenta" data-button>Cuenta</a></span>
</header>
<main class="shell">
{{block "content" .}}{{end}}
</main>
<footer class="shell"><small>Agogo · Go stdlib + sqlc · estilo con scc · UI con lumen — el mismo no-magia en las tres capas</small></footer>
{{block "scripts" .}}{{end}}
</body>
</html>{{end}}
