{{define "content"}}
<h1>Contacto</h1>
{{if .Flash}}<div class="alert" data-variant="success" role="status">{{.Flash}}</div>{{end}}
<form method="POST" action="/contacto" novalidate data-ref="form">
  <input type="hidden" name="csrf_token" value="{{.Token}}">
  <p class="field">
    <label for="nombre">Nombre</label>
    <input id="nombre" name="nombre" value="{{.Values.nombre}}" placeholder="Tu nombre" data-ref="nombre">
    <small class="err" data-ref="error-nombre">{{.Errors.nombre}}</small>
  </p>
  <p class="field">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" value="{{.Values.email}}" placeholder="tu@correo.com" data-ref="email">
    <small class="err" data-ref="error-email">{{.Errors.email}}</small>
  </p>
  <p class="field">
    <label for="mensaje">Mensaje</label>
    <textarea id="mensaje" name="mensaje" rows="5" placeholder="¿En qué te ayudamos?" data-ref="mensaje">{{.Values.mensaje}}</textarea>
    <small class="err" data-ref="error-mensaje">{{.Errors.mensaje}}</small>
  </p>
  <button type="submit" data-variant="primary">Enviar</button>
</form>
{{end}}
{{define "scripts"}}<script type="module" src="/static/js/contacto.js"></script>{{end}}
